<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Color Tap & Copy</title>
    
    <link rel="icon" href="./image_37.png">
    <link rel="apple-touch-icon" href="./image_37.png">

    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
            --h-standard: 54px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding: env(safe-area-inset-top, 15px) 15px env(safe-area-inset-bottom, 15px) 15px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }

        h1 { font-size: 1.6rem; font-weight: 900; letter-spacing: -1.5px; }
        
        .hub-link {
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--main);
            background: var(--accent);
            padding: 8px 12px;
            border-radius: 12px;
        }

        .subtitle { font-size: 0.8rem; color: #666; font-weight: 800; margin-bottom: 10px; text-align: left; }

        #preview {
            width: 100%;
            height: 60px;
            background-color: #ccc;
            border-radius: var(--radius);
            border: 2px solid var(--accent);
            transition: background-color 0.1s;
            margin-bottom: 10px;
        }

        .info-row {
            display: flex;
            gap: 8px;
            width: 100%;
            margin-bottom: 10px;
        }

        input {
            width: 130px;
            height: var(--h-standard);
            border-radius: var(--radius);
            border: 2px solid var(--accent);
            background-color: var(--input-bg);
            color: var(--main) !important;
            font-size: 1.2rem;
            font-weight: 900;
            text-align: center;
            outline: none;
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main) !important;
            opacity: 1 !important;
        }

        .copy-btn {
            flex: 1;
            height: var(--h-standard);
            background-color: var(--main);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            -webkit-text-fill-color: #fff;
            transition: background 0.2s;
        }
        .copy-btn:active { transform: scale(0.98); }

        .grid-wrapper {
            flex: 1;
            touch-action: none; 
            background: var(--bg);
            padding: 4px;
            border-radius: var(--radius);
            border: 2px solid var(--accent);
            margin-bottom: 10px;
            display: flex;
            overflow: hidden; /* はみ出しを物理的にカット */
        }

        #colorGrid {
            display: grid;
            grid-template-columns: repeat(20, 1fr); /* 20等分 */
            gap: 1px;
            width: 100%;
            height: 100%;
        }

        .tile { 
            width: 100%; 
            min-height: 20px; /* タップしやすさを確保 */
            cursor: crosshair; 
        }

        .footer-btns {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        .kofi-btn {
            flex: 1;
            height: 48px;
            background: var(--main);
            color: #fff;
            border-radius: var(--radius);
            text-decoration: none;
            font-weight: 900;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-text-fill-color: #fff;
        }
        .home-btn {
            flex: 1;
            height: 48px;
            background: var(--accent);
            color: var(--main);
            border: none;
            border-radius: var(--radius);
            font-weight: 800;
            font-size: 0.85rem;
            cursor: pointer;
        }

        footer { text-align: center; font-size: 0.7rem; color: #999; line-height: 1.4; font-weight: 700; padding-bottom: 5px; }
        footer a { color: inherit; text-decoration: underline; }

        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: #fff; width: 90%; max-width: 320px; padding: 35px;
            border-radius: var(--radius); text-align: left; position: relative;
        }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #ccc; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Tap & Copy</h1>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>
    <p class="subtitle">Quick color picker.</p>

    <div id="preview"></div>
    
    <div class="info-row">
        <input type="text" id="hexDisplay" readonly value="#CCCCCC">
        <button id="copyBtn" class="copy-btn">COPY</button>
    </div>

    <div class="grid-wrapper">
        <div id="colorGrid"></div>
    </div>

    <div class="footer-btns">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️buy me a coffee</a>
        <button class="home-btn" onclick="showModal()">Add Home</button>
    </div>

    <footer id="dynamicFooter">
        No login / No tracking / No ads / Browser only<br>
        <a href="https://afrorakda.com/privacy/">Privacy Policy</a> / afrorakda © 2026
    </footer>
</div>

<div id="modal" onclick="hideModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-x" onclick="hideModal()">×</span>
        <h3 style="margin-bottom: 10px; font-weight: 900;">📱 Install</h3>
        <div style="font-size: 0.9rem; line-height: 1.6; font-weight: 700;">
            <p>🍏 <strong>iPhone:</strong><br>Share > Add to Home Screen</p>
            <p style="margin-top:10px;">🤖 <strong>Android:</strong><br>Menu (⋮) > Add to Home Screen</p>
        </div>
    </div>
</div>

<script>
    const colorGrid = document.getElementById('colorGrid');
    const preview = document.getElementById('preview');
    const hexDisplay = document.getElementById('hexDisplay');
    const copyBtn = document.getElementById('copyBtn');

    const rows = 18; 
    const cols = 20;

    function generateGrid() {
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                const h = (c / cols) * 360;
                const s = 100;
                const l = 100 - (r / (rows - 1)) * 95;
                let color;
                if (c === cols - 1) {
                    const gray = Math.floor(255 - (r / (rows - 1)) * 255);
                    color = `rgb(${gray},${gray},${gray})`;
                } else {
                    color = `hsl(${h}, ${s}%, ${l}%)`;
                }
                tile.style.backgroundColor = color;
                colorGrid.appendChild(tile);
            }
        }
    }

    function updateColor(e) {
        let target;
        if (e.type.startsWith('touch')) {
            const touch = e.touches[0];
            target = document.elementFromPoint(touch.clientX, touch.clientY);
        } else {
            target = e.target;
        }
        if (target && target.classList.contains('tile')) {
            const rgb = window.getComputedStyle(target).backgroundColor;
            const hex = rgbToHex(rgb);
            preview.style.backgroundColor = hex;
            hexDisplay.value = hex.toUpperCase();
        }
    }

    function rgbToHex(rgb) {
        const res = rgb.match(/\d+/g);
        return "#" + ((1 << 24) + (parseInt(res[0]) << 16) + (parseInt(res[1]) << 8) + parseInt(res[2])).toString(16).slice(1);
    }

    function copyHex() {
        hexDisplay.select();
        hexDisplay.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(hexDisplay.value);
        copyBtn.innerText = "COPIED!";
        copyBtn.style.background = "#27ae60";
        setTimeout(() => {
            copyBtn.innerText = "COPY";
            copyBtn.style.background = "var(--main)";
        }, 800);
    }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }

    async function loadFooter() {
        try {
            const res = await fetch('footer.json');
            if (res.ok) {
                const data = await res.json();
                if (data.footerHtml) document.getElementById('dynamicFooter').innerHTML = data.footerHtml;
            }
        } catch (e) {}
    }

    colorGrid.addEventListener('mousedown', updateColor);
    colorGrid.addEventListener('mouseover', (e) => { if(e.buttons === 1) updateColor(e); });
    colorGrid.addEventListener('touchstart', updateColor, {passive: false});
    colorGrid.addEventListener('touchmove', (e) => { e.preventDefault(); updateColor(e); }, {passive: false});
    copyBtn.addEventListener('click', copyHex);

    window.onload = loadFooter;
    generateGrid();
</script>

</body>
</html>
