<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Tap & Copy</title>
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
            --h-standard: 54px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: var(--main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h1 { font-size: 1.5rem; margin: 0; text-align: center; font-weight: 800; }
        p.desc { font-size: 0.9rem; margin: 0 0 5px; text-align: center; opacity: 0.8; }

        #preview {
            width: 100%;
            height: 100px;
            background-color: #ccc;
            border-radius: var(--radius);
            border: 1px solid var(--accent);
            transition: background-color 0.1s;
        }

        /* 1. Copy Button Alignment Fix */
        .info-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        input {
            flex: 1;
            min-width: 0; /* Prevent overflow */
            height: var(--h-standard);
            border-radius: var(--radius);
            border: none;
            background-color: var(--input-bg);
            color: var(--main);
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            outline: none;
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main);
            opacity: 1 !important;
        }

        button.copy-btn {
            width: 100px; /* Fixed width to prevent jumping on "COPIED!" */
            height: var(--h-standard);
            background-color: var(--main);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            flex-shrink: 0;
        }

        .grid-wrapper {
            width: 100%;
            touch-action: none; 
            background: var(--bg);
            padding: 5px;
            border-radius: var(--radius);
            border: 1px solid var(--accent);
        }

        #colorGrid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 2px;
            width: 100%;
        }

        .tile { aspect-ratio: 1/1; cursor: crosshair; }

        /* 3. Footer Area (Image 4/5 Trace) */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 15px;
            width: 100%;
        }

        .btn-kofi {
            background-color: var(--main);
            color: #fff;
            text-decoration: none;
        }

        .btn-ath {
            background-color: #fff;
            color: var(--main);
            border: 1px solid var(--accent);
        }

        .footer-btn {
            height: var(--h-standard);
            border-radius: var(--radius);
            font-weight: bold;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            width: 100%;
            border: none;
        }

        /* 2. Install Modal (Image 3 Trace) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #fff;
            padding: 25px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 340px;
            position: relative;
            text-align: left;
        }

        .close-x {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 20px;
            cursor: pointer;
            line-height: 1;
            font-weight: bold;
        }

        .modal-content h2 { 
            margin: 0 0 15px; 
            font-size: 1.3rem; 
            display: flex; 
            align-items: center; 
            gap: 8px;
        }

        .modal-body { font-size: 0.95rem; line-height: 1.6; color: #444; }
        .modal-body p { margin: 0 0 10px; }
        .modal-body ul { list-style: none; padding: 0; margin: 0; }
        .modal-body li { margin-bottom: 8px; }

        footer {
            margin-top: auto;
            padding: 30px 0 20px;
            font-size: 10px;
            text-align: center;
            color: #bbb;
            line-height: 1.8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Color Tap & Copy</h1>
    <p class="desc">Tap or slide to get Hex code instantly.</p>

    <div id="preview"></div>
    
    <div class="info-row">
        <input type="text" id="hexDisplay" readonly value="#CCCCCC">
        <button id="copyBtn" class="copy-btn">COPY</button>
    </div>

    <div class="grid-wrapper">
        <div id="colorGrid"></div>
    </div>

    <div class="btn-group">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="footer-btn btn-kofi">Buy me a coffee ☕</a>
        <button class="footer-btn btn-ath" onclick="openModal()">Add to Home Screen</button>
    </div>
</div>

<div id="athModal" class="modal">
    <div class="modal-content">
        <span class="close-x" onclick="closeModal()">&times;</span>
        <h2>📱 Install</h2>
        <div class="modal-body">
            <p>Add to home screen.</p>
            <ul>
                <li>🍏 <strong>iPhone:</strong> Share > Add to Home Screen</li>
                <li>🤖 <strong>Android:</strong> Menu > Add to home screen</li>
            </ul>
        </div>
    </div>
</div>

<footer>
    No login / No tracking / No ads / Browser only<br>
    Privacy Policy / afrorakda © 2026
</footer>

<script>
    const colorGrid = document.getElementById('colorGrid');
    const preview = document.getElementById('preview');
    const hexDisplay = document.getElementById('hexDisplay');
    const copyBtn = document.getElementById('copyBtn');
    const modal = document.getElementById('athModal');

    const rows = 12;
    const cols = 20;

    function generateGrid() {
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                const h = (c / cols) * 360;
                const s = 100;
                const l = 100 - (r / (rows - 1)) * 95;
                let color;
                if (c === cols - 1) {
                    const gray = Math.floor(255 - (r / (rows - 1)) * 255);
                    color = `rgb(${gray},${gray},${gray})`;
                } else {
                    color = `hsl(${h}, ${s}%, ${l}%)`;
                }
                tile.style.backgroundColor = color;
                colorGrid.appendChild(tile);
            }
        }
    }

    function updateColor(e) {
        let target;
        if (e.type.startsWith('touch')) {
            const touch = e.touches[0];
            target = document.elementFromPoint(touch.clientX, touch.clientY);
        } else {
            target = e.target;
        }
        if (target && target.classList.contains('tile')) {
            const rgb = window.getComputedStyle(target).backgroundColor;
            const hex = rgbToHex(rgb);
            preview.style.backgroundColor = hex;
            hexDisplay.value = hex.toUpperCase();
        }
    }

    function rgbToHex(rgb) {
        const res = rgb.match(/\d+/g);
        return "#" + ((1 << 24) + (parseInt(res[0]) << 16) + (parseInt(res[1]) << 8) + parseInt(res[2])).toString(16).slice(1);
    }

    function copyHex() {
        hexDisplay.select();
        hexDisplay.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(hexDisplay.value);
        const originalText = "COPY";
        copyBtn.innerText = "COPIED!";
        setTimeout(() => copyBtn.innerText = originalText, 1000);
    }

    function openModal() { modal.style.display = 'flex'; }
    function closeModal() { modal.style.display = 'none'; }
    window.onclick = (e) => { if (e.target == modal) closeModal(); }

    colorGrid.addEventListener('mousedown', updateColor);
    colorGrid.addEventListener('mouseover', (e) => { if(e.buttons === 1) updateColor(e); });
    colorGrid.addEventListener('touchstart', updateColor, {passive: false});
    colorGrid.addEventListener('touchmove', updateColor, {passive: false});
    copyBtn.addEventListener('click', copyHex);

    generateGrid();
</script>

</body>
</html>
