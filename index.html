<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Tap & Copy</title>
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
            --h-standard: 54px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg);
            color: var(--main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Preview Area */
        #preview {
            width: 100%;
            height: 100px;
            background-color: #ddd;
            border-radius: var(--radius);
            border: 1px solid var(--accent);
            transition: background-color 0.1s;
        }

        /* Color Info */
        .info-row {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            height: var(--h-standard);
            border-radius: var(--radius);
            border: none;
            background-color: var(--input-bg);
            color: var(--main);
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            outline: none;
            /* iOS Specific */
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main);
            opacity: 1 !important;
        }

        button {
            height: var(--h-standard);
            padding: 0 25px;
            background-color: var(--main);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.7;
        }

        /* Grid Container */
        .grid-wrapper {
            width: 100%;
            touch-action: none; /* Prevent scrolling while sliding */
            background: var(--bg);
            padding: 5px;
            border-radius: var(--radius);
            border: 1px solid var(--accent);
        }

        #colorGrid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 2px;
            width: 100%;
        }

        .tile {
            aspect-ratio: 1/1;
            cursor: crosshair;
        }

        /* Footer & UI */
        footer {
            margin-top: auto;
            padding: 40px 0 20px;
            font-size: 10px;
            text-align: center;
            color: #999;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="preview"></div>
    
    <div class="info-row">
        <input type="text" id="hexDisplay" readonly value="#CCCCCC">
        <button id="copyBtn">COPY</button>
    </div>

    <div class="grid-wrapper">
        <div id="colorGrid"></div>
    </div>
</div>

<footer>
    No login / No tracking / No ads / Browser only<br>
    Privacy Policy / afrorakda © 2026
</footer>

<script>
    const colorGrid = document.getElementById('colorGrid');
    const preview = document.getElementById('preview');
    const hexDisplay = document.getElementById('hexDisplay');
    const copyBtn = document.getElementById('copyBtn');

    // Generate Color Palette (Standard Web-Safeish / HSL based)
    const rows = 12;
    const cols = 20;

    function generateGrid() {
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                
                // HSL Calculation to match the uploaded reference image vibe
                const h = (c / cols) * 360;
                const s = 100;
                const l = 100 - (r / (rows - 1)) * 90; // Light to Dark (including grayscale row)
                
                // Special handling for the last column to be grayscale if needed
                let color;
                if (c === cols - 1) {
                    const gray = Math.floor(255 - (r / (rows - 1)) * 255);
                    color = `rgb(${gray},${gray},${gray})`;
                } else {
                    color = `hsl(${h}, ${s}%, ${l}%)`;
                }

                tile.style.backgroundColor = color;
                colorGrid.appendChild(tile);
            }
        }
    }

    function updateColor(e) {
        let target;
        if (e.type.startsWith('touch')) {
            const touch = e.touches[0];
            target = document.elementFromPoint(touch.clientX, touch.clientY);
        } else {
            target = e.target;
        }

        if (target && target.classList.contains('tile')) {
            const rgb = window.getComputedStyle(target).backgroundColor;
            const hex = rgbToHex(rgb);
            preview.style.backgroundColor = hex;
            hexDisplay.value = hex.toUpperCase();
        }
    }

    function rgbToHex(rgb) {
        const res = rgb.match(/\d+/g);
        return "#" + ((1 << 24) + (parseInt(res[0]) << 16) + (parseInt(res[1]) << 8) + parseInt(res[2])).toString(16).slice(1);
    }

    function copyHex() {
        hexDisplay.select();
        hexDisplay.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(hexDisplay.value);
        
        const originalText = copyBtn.innerText;
        copyBtn.innerText = "COPIED!";
        setTimeout(() => copyBtn.innerText = originalText, 1000);
    }

    // Event Listeners
    colorGrid.addEventListener('mousedown', updateColor);
    colorGrid.addEventListener('mouseover', (e) => { if(e.buttons === 1) updateColor(e); });
    colorGrid.addEventListener('touchstart', updateColor, {passive: false});
    colorGrid.addEventListener('touchmove', updateColor, {passive: false});
    copyBtn.addEventListener('click', copyHex);

    // Init
    generateGrid();
    // Default color
    preview.style.backgroundColor = "#CCCCCC";
</script>

</body>
</html>
